name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      # 生成 GitHub Stats Extended（你自己的版本）
      - name: Generate GitHub Stats Extended
        run: |
          for i in 1 2 3; do
            curl -sL --fail "https://github-stats-extended.vercel.app/api?username=univers629" -o github-stats.svg && break
            echo "Attempt $i failed, retrying..."
            sleep 5
          done
          if ! head -1 github-stats.svg | grep -q "<svg"; then
            echo "ERROR: github-stats.svg is not valid SVG"
            cat github-stats.svg
            exit 1
          fi
      
      # 生成 Top Languages（官方版本）
      - name: Generate Top Languages
        run: |
          for i in 1 2 3; do
            curl -sL --fail "https://github-readme-stats.vercel.app/api/top-langs/?username=univers629&layout=compact&hide_border=true&langs_count=6&theme=default" -o top-langs.svg && break
            echo "Attempt $i failed, retrying..."
            sleep 5
          done
          if ! head -1 top-langs.svg | grep -q "<svg"; then
            echo "ERROR: top-langs.svg is not valid SVG"
            cat top-langs.svg
            exit 1
          fi
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg top-langs.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Update stats [skip ci]"
          git push