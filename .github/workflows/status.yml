name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0 点运行（北京时间早8点）
  workflow_dispatch:        # 允许手动点按钮运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 允许自动提交代码
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate GitHub Stats
        run: curl -o github-stats.svg "https://github-readme-stats.vercel.app/api?username=univers629&show_icons=true&theme=default&hide_border=true"
      
      - name: Generate Top Languages
        run: curl -o top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=univers629&layout=compact&hide_border=true&langs_count=6&theme=default"
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg top-langs.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Update stats [skip ci]"
          git push